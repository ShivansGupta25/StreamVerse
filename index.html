<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/Image.png">
</head>

<body>

    <!----------------------------------------------------------------- HEADER ----------------------------------------------------------------->

    <div class="header">
        <div class="logo">StreamVerse</div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search for movies..." id="searchInput">
            </div>

            <div class="filters">
                <select id="genreFilter">
                    <option value="">All Genres</option>
                </select>

                <select id="yearFilter">
                    <option value="">All Years</option>
                </select>

                <select id="sortFilter">
                    <option value="">Sort By</option>
                    <option value="popularity.desc">Most Popular</option>
                    <option value="">Highest Rated</option>
                    <option value="">Latest Release</option>
                    <option value="">A-Z</option>
                </select>
            </div>

            <button class="clear-btn" id="clearBtn"> Clear All</button>
        </div>
    </div>


    <!----------------------------------------------------------------- MAIN BODY ----------------------------------------------------------------->

    <div class="main-content">
        <div id="trendingSection">
            <div class="section-title">
                🔥 Trending Movie
            </div>
            <div class="carousel-container">
                <button class="carousel-btn prev" id="trendingPrev">
                    ⪪
                </button>

                <div class="carousel" id="trendingCarousel">
                    <div class="loading">
                        Loading trending movies...
                    </div>
                    <button class="carousel-btn next" id="trendingNext">
                    ⪫
                </button>
                </div>
            </div>
            <div class="section-title" id="randomSectionTitle">
                🎬 Discover Movies
            </div>
            <div class="movies-grid" id="moviesGrid">
                <div class="loading">Loading Movies...</div>
            </div>
         </div>
    </div>
    


<script src="script.js"></script>
</body>
</html>
